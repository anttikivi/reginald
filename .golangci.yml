linters:
  enable-all: true
  disable:
    - godox

linters-settings:
  cyclop:
    # max-complexity: 10
    max-complexity: 20
  depguard:
    rules:
      Main:
        list-mode: strict
        allow:
          - $gostd
          - github.com/anttikivi
          - github.com/fatih/color
          - github.com/spf13/cobra
          - github.com/spf13/viper
  funlen:
    lines: 100
    statements: 50
    ignore-comments: true
  varnamelen:
    max-distance: 30
    min-name-length: 3

run:
  timeout: "1m"
